name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run package

      - name: Setup Node for npm (Trusted Publishers / OIDC)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public --tag preview

  release-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build release binaries
        run: bun run build:binaries --outdir dist/release

      - name: Verify release binaries
        run: |
          test -f dist/release/nvst-darwin-x64
          test -f dist/release/nvst-linux-x64
          test -f dist/release/nvst-windows-x64.exe

      - name: Smoke-test Linux binary
        run: |
          chmod +x dist/release/nvst-linux-x64
          dist/release/nvst-linux-x64 --version

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/release/nvst-darwin-x64
            dist/release/nvst-linux-x64
            dist/release/nvst-windows-x64.exe
